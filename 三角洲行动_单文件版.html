  <script>
/* 二维向量 / 几何工具（纯函数，可 node 单测） */
(function (DF) {
  'use strict';

  var V = {
    add:  function (a, b) { return { x: a.x + b.x, y: a.y + b.y }; },
    sub:  function (a, b) { return { x: a.x - b.x, y: a.y - b.y }; },
    scale:function (a, s) { return { x: a.x * s, y: a.y * s }; },
    len:  function (a) { return Math.hypot(a.x, a.y); },
    dist: function (a, b) { return Math.hypot(a.x - b.x, a.y - b.y); },
    dist2:function (a, b) { var dx=a.x-b.x, dy=a.y-b.y; return dx*dx+dy*dy; },
    norm: function (a) { var l = Math.hypot(a.x, a.y) || 1; return { x: a.x / l, y: a.y / l }; },
    dot:  function (a, b) { return a.x * b.x + a.y * b.y; },
    fromAngle: function (r) { return { x: Math.cos(r), y: Math.sin(r) }; },
    angle: function (a) { return Math.atan2(a.y, a.x); },
    rotate: function (a, r) {
      var c = Math.cos(r), s = Math.sin(r);
      return { x: a.x * c - a.y * s, y: a.x * s + a.y * c };
    },
    // 角度归一化到 [-PI, PI]
    wrapAngle: function (r) {
      while (r >  Math.PI) r -= Math.PI * 2;
      while (r < -Math.PI) r += Math.PI * 2;
      return r;
    },
    lerpAngle: function (a, b, t) {
      var d = V.wrapAngle(b - a);
      return a + d * t;
    },
    clamp: function (v, lo, hi) { return v < lo ? lo : (v > hi ? hi : v); }
  };

  // 线段 (p1->p2) 与轴对齐矩形 rect{x,y,w,h} 是否相交
  function segIntersectsRect(p1, p2, rect) {
    if (pointInRect(p1, rect) || pointInRect(p2, rect)) return true;
    var r = rect;
    return segSeg(p1, p2, {x:r.x,y:r.y},       {x:r.x+r.w,y:r.y}) ||
           segSeg(p1, p2, {x:r.x+r.w,y:r.y},   {x:r.x+r.w,y:r.y+r.h}) ||
           segSeg(p1, p2, {x:r.x+r.w,y:r.y+r.h},{x:r.x,y:r.y+r.h}) ||
           segSeg(p1, p2, {x:r.x,y:r.y+r.h},   {x:r.x,y:r.y});
  }

  function pointInRect(p, r) {
    return p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h;
  }

  // 线段相交判定
  function segSeg(p1, p2, p3, p4) {
    var d = (p2.x - p1.x) * (p4.y - p3.y) - (p2.y - p1.y) * (p4.x - p3.x);
    if (d === 0) return false;
    var u = ((p3.x - p1.x) * (p4.y - p3.y) - (p3.y - p1.y) * (p4.x - p3.x)) / d;
    var v = ((p3.x - p1.x) * (p2.y - p1.y) - (p3.y - p1.y) * (p2.x - p1.x)) / d;
    return u >= 0 && u <= 1 && v >= 0 && v <= 1;
  }

  // 圆 (c, radius) 与线段最近碰撞点，命中返回 {t, point}，否则 null
  function segCircle(p1, p2, c, radius) {
    var dx = p2.x - p1.x, dy = p2.y - p1.y;
    var fx = p1.x - c.x, fy = p1.y - c.y;
    var a = dx*dx + dy*dy;
    var b = 2 * (fx*dx + fy*dy);
    var cc = fx*fx + fy*fy - radius*radius;
    var disc = b*b - 4*a*cc;
    if (disc < 0 || a === 0) return null;
    disc = Math.sqrt(disc);
    var t1 = (-b - disc) / (2*a);
    var t2 = (-b + disc) / (2*a);
    var t = (t1 >= 0 && t1 <= 1) ? t1 : ((t2 >= 0 && t2 <= 1) ? t2 : -1);
    if (t < 0) return null;
    return { t: t, point: { x: p1.x + dx*t, y: p1.y + dy*t } };
  }

  DF.V = V;
  DF.geom = {
    segIntersectsRect: segIntersectsRect,
    pointInRect: pointInRect,
    segSeg: segSeg,
    segCircle: segCircle
  };
})(typeof window !== 'undefined' ? (window.DF = window.DF || {}) : (module.exports = {}));

  </script>

  <script>
/* 可复现伪随机数（mulberry32） */
(function (DF) {
  'use strict';

  function RNG(seed) {
    this.s = (seed >>> 0) || 0x9e3779b9;
  }
  RNG.prototype.next = function () {
    var t = (this.s += 0x6d2b79f5);
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
  RNG.prototype.range  = function (lo, hi) { return lo + (hi - lo) * this.next(); };
  RNG.prototype.int    = function (lo, hi) { return Math.floor(this.range(lo, hi + 1)); };
  RNG.prototype.pick   = function (arr) { return arr[Math.floor(this.next() * arr.length)]; };
  RNG.prototype.chance = function (p) { return this.next() < p; };
  RNG.prototype.sign   = function () { return this.next() < 0.5 ? -1 : 1; };

  DF.RNG = RNG;
})(typeof window !== 'undefined' ? (window.DF = window.DF || {}) : (module.exports = {}));

  </script>

  <script>
/* 键鼠输入管理 */
(function (DF) {
  'use strict';

  function Input(canvas) {
    this.canvas = canvas;
    this.keys = {};          // 当前按下
    this.pressed = {};       // 本帧刚按下（消费型）
    this.mouse = { x: 0, y: 0, worldX: 0, worldY: 0 };
    this.mouseDown = false;
    this.mouseClicked = false;
    this._bind();
  }

  Input.prototype._bind = function () {
    var self = this;
    window.addEventListener('keydown', function (e) {
      var k = e.key.toLowerCase();
      if (!self.keys[k]) self.pressed[k] = true;
      self.keys[k] = true;
      // 阻止空格/方向键滚动页面
      if ([' ', 'tab'].indexOf(k) >= 0) e.preventDefault();
    });
    window.addEventListener('keyup', function (e) {
      self.keys[e.key.toLowerCase()] = false;
    });
    function updateCoords(e) {
      var r = self.canvas.getBoundingClientRect();
      if (!r.width || !r.height) return;
      self.mouse.x = (e.clientX - r.left) * (self.canvas.width / r.width);
      self.mouse.y = (e.clientY - r.top) * (self.canvas.height / r.height);
    }
    // 绑定到 window（而非仅 canvas），避免任何布局/命中测试问题导致点击丢失
    window.addEventListener('mousemove', updateCoords);
    window.addEventListener('mousedown', function (e) {
      if (e.button === 0) { updateCoords(e); self.mouseDown = true; self.mouseClicked = true; }
    });
    window.addEventListener('mouseup', function (e) {
      if (e.button === 0) self.mouseDown = false;
    });
    this.canvas.addEventListener('contextmenu', function (e) { e.preventDefault(); });
  };

  Input.prototype.down = function (k) { return !!this.keys[k]; };
  Input.prototype.justPressed = function (k) { return !!this.pressed[k]; };
  Input.prototype.justClicked = function () { return this.mouseClicked; };

  // 每帧末尾调用，清空消费型状态
  Input.prototype.endFrame = function () {
    this.pressed = {};
    this.mouseClicked = false;
  };

  DF.Input = Input;
})(window.DF = window.DF || {});

  </script>

  <script>
/* 程序化音效（WebAudio，无需素材文件） */
(function (DF) {
  'use strict';

  function Audio() {
    this.ctx = null;
    this.enabled = true;
    this.master = null;
  }

  Audio.prototype.ensure = function () {
    if (this.ctx) return;
    try {
      var AC = window.AudioContext || window.webkitAudioContext;
      this.ctx = new AC();
      this.master = this.ctx.createGain();
      this.master.gain.value = 0.35;
      this.master.connect(this.ctx.destination);
    } catch (e) { this.enabled = false; }
  };

  Audio.prototype.resume = function () {
    this.ensure();
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  };

  // 基础音块
  Audio.prototype._blip = function (freq, dur, type, gain, sweep) {
    if (!this.enabled) return;
    this.ensure();
    if (!this.ctx) return;
    var t = this.ctx.currentTime;
    var o = this.ctx.createOscillator();
    var g = this.ctx.createGain();
    o.type = type || 'square';
    o.frequency.setValueAtTime(freq, t);
    if (sweep) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq * sweep), t + dur);
    g.gain.setValueAtTime(gain || 0.3, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g); g.connect(this.master);
    o.start(t); o.stop(t + dur);
  };

  // 噪声（枪响质感）
  Audio.prototype._noise = function (dur, gain, cutoff) {
    if (!this.enabled) return;
    this.ensure();
    if (!this.ctx) return;
    var t = this.ctx.currentTime;
    var n = Math.floor(this.ctx.sampleRate * dur);
    var buf = this.ctx.createBuffer(1, n, this.ctx.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
    var src = this.ctx.createBufferSource(); src.buffer = buf;
    var f = this.ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = cutoff || 1800;
    var g = this.ctx.createGain(); g.gain.value = gain || 0.3;
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    src.connect(f); f.connect(g); g.connect(this.master);
    src.start(t); src.stop(t + dur);
  };

  Audio.prototype.shot = function (category) {
    var tone = (DF.WEAPON_TONE && DF.WEAPON_TONE[category]) || 220;
    this._noise(0.10, 0.28, 1400 + tone);
    this._blip(tone, 0.06, 'sawtooth', 0.14, 0.4);
  };
  Audio.prototype.reload   = function () { this._blip(180, 0.05, 'square', 0.15); setTimeout(function(){}, 0); };
  Audio.prototype.hit      = function () { this._blip(600, 0.05, 'square', 0.18, 1.4); };
  Audio.prototype.headshot = function () { this._blip(900, 0.08, 'square', 0.22, 1.6); };
  Audio.prototype.hurt     = function () { this._blip(140, 0.14, 'sawtooth', 0.22, 0.6); };
  Audio.prototype.death    = function () { this._noise(0.25, 0.3, 700); this._blip(120, 0.3, 'sawtooth', 0.2, 0.4); };
  Audio.prototype.knife    = function () { this._noise(0.06, 0.25, 5000); };
  Audio.prototype.click    = function () { this._blip(500, 0.03, 'square', 0.12); };
  Audio.prototype.buy      = function () { this._blip(440, 0.05, 'triangle', 0.2); this._blip(660, 0.06, 'triangle', 0.18); };
  Audio.prototype.win      = function () { var s=this; [523,659,784,1046].forEach(function(f,i){ setTimeout(function(){ s._blip(f,0.18,'triangle',0.25);}, i*120);}); };
  Audio.prototype.lose     = function () { var s=this; [392,330,262].forEach(function(f,i){ setTimeout(function(){ s._blip(f,0.22,'sawtooth',0.2);}, i*150);}); };
  Audio.prototype.decrypt  = function () { this._blip(880, 0.04, 'square', 0.1); };

  DF.Audio = Audio;
})(window.DF = window.DF || {});

  <script>
/* 轻量粒子系统：枪口火花 / 血迹 / 弹壳 / 破译火花 / 文字飘字 */
(function (DF) {
  'use strict';

  function Particles() {
    this.list = [];
    this.floaters = []; // 伤害飘字
  }

  Particles.prototype.spawn = function (x, y, opts) {
    opts = opts || {};
    var n = opts.count || 6;
    var V = DF.V;
    for (var i = 0; i < n; i++) {
      var a = Math.random() * Math.PI * 2;
      var sp = (opts.speed || 120) * (0.4 + Math.random() * 0.8);
      this.list.push({
        x: x, y: y,
        vx: Math.cos(a) * sp + (opts.vx || 0),
        vy: Math.sin(a) * sp + (opts.vy || 0),
        life: (opts.life || 0.4) * (0.6 + Math.random() * 0.6),
        maxLife: opts.life || 0.4,
        size: opts.size || 3,
        color: opts.color || '#ffcc55',
        drag: opts.drag != null ? opts.drag : 0.9,
        gravity: opts.gravity || 0
      });
    }
  };

  Particles.prototype.muzzle = function (x, y, angle) {
    var V = DF.V;
    for (var i = 0; i < 4; i++) {
      var a = angle + (Math.random() - 0.5) * 0.5;
      var sp = 260 + Math.random() * 180;
      this.list.push({ x:x, y:y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:0.09, maxLife:0.09, size:3.5, color:'#ffdd66', drag:0.8, gravity:0 });
    }
  };

  Particles.prototype.blood = function (x, y, angle) {
    this.spawn(x, y, { count: 9, speed: 160, life: 0.5, size: 3, color: '#c62828', vx: Math.cos(angle)*80, vy: Math.sin(angle)*80, drag: 0.88 });
  };

  Particles.prototype.spark = function (x, y) {
    this.spawn(x, y, { count: 5, speed: 130, life: 0.3, size: 2, color: '#bbccff', drag: 0.85 });
  };

  Particles.prototype.floater = function (x, y, text, color) {
    this.floaters.push({ x: x, y: y, text: text, color: color || '#fff', life: 0.9, vy: -40 });
  };

  Particles.prototype.update = function (dt) {
    for (var i = this.list.length - 1; i >= 0; i--) {
      var p = this.list[i];
      p.life -= dt;
      if (p.life <= 0) { this.list.splice(i, 1); continue; }
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vx *= p.drag; p.vy = p.vy * p.drag + p.gravity * dt;
    }
    for (var j = this.floaters.length - 1; j >= 0; j--) {
      var f = this.floaters[j];
      f.life -= dt; f.y += f.vy * dt; f.vy *= 0.94;
      if (f.life <= 0) this.floaters.splice(j, 1);
    }
  };

  Particles.prototype.render = function (ctx) {
    for (var i = 0; i < this.list.length; i++) {
      var p = this.list[i];
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
    ctx.textAlign = 'center';
    for (var j = 0; j < this.floaters.length; j++) {
      var f = this.floaters[j];
      ctx.globalAlpha = Math.min(1, f.life * 1.6);
      ctx.fillStyle = f.color;
      ctx.font = 'bold 15px Consolas, monospace';
      ctx.fillText(f.text, f.x, f.y);
    }
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
  };

  DF.Particles = Particles;
})(window.DF = window.DF || {});

  </script>

  <script>
/* 地图：边界、掩体、进攻/防守出生点、密钥站点、视线遮挡 */
(function (DF) {
  'use strict';

  function GameMap(cfg) {
    var W = cfg.world.width, H = cfg.world.height;
    this.width = W;
    this.height = H;
    var T = 24; // 边界厚度

    // 掩体墙（阻挡移动 + 遮挡视线/子弹）
    // 设计原则：开阔可交火的中央竞技场 + 对称掩体 + 侧翼通路，避免死锁式对峙。
    this.walls = [
      // 外边界
      { x: 0, y: 0, w: W, h: T },
      { x: 0, y: H - T, w: W, h: T },
      { x: 0, y: 0, w: T, h: H },
      { x: W - T, y: 0, w: T, h: H },

      // 四角掩体柱（提供架枪点，不封锁视线）
      { x: 235, y: 235, w: 60, h: 60 },
      { x: 985, y: 235, w: 60, h: 60 },
      { x: 235, y: 425, w: 60, h: 60 },
      { x: 985, y: 425, w: 60, h: 60 },

      // 中央上下短墙（围绕站点形成可争夺据点，两侧留出通路）
      { x: 560, y: 250, w: 160, h: 26 },   // 站点上方掩体
      { x: 560, y: 444, w: 160, h: 26 },   // 站点下方掩体

      // 左右竖向隔断（制造进攻左右分推的节奏，中段留缺口）
      { x: 430, y: 120, w: 26, h: 130 },
      { x: 430, y: 470, w: 26, h: 130 },
      { x: 824, y: 120, w: 26, h: 130 },
      { x: 824, y: 470, w: 26, h: 130 }
    ];

    // 低矮掩体（阻挡子弹与视线）
    this.crates = [
      { x: 610, y: 150, w: 44, h: 44 },   // 站点正上/下的近身掩体
      { x: 626, y: 526, w: 44, h: 44 },
      { x: 360, y: 340, w: 44, h: 44 },   // 站点左右近身掩体
      { x: 916, y: 340, w: 44, h: 44 }
    ];

    // 站点（密钥破译点）—— 正中央，多方向可争夺
    this.site = { x: W / 2, y: H / 2 };

    // 出生点：进攻方（下方），防守方（上方）
    this.attackerSpawns = [
      { x: 360, y: 660 }, { x: 640, y: 685 }, { x: 920, y: 660 }
    ];
    this.defenderSpawns = [
      { x: 360, y: 90 }, { x: 920, y: 90 }, { x: 640, y: 95 }
    ];

    // 所有阻挡体（墙 + 箱）
    this.blockers = this.walls.concat(this.crates);
  }

  // 点是否可通行（考虑半径）
  GameMap.prototype.circleBlocked = function (x, y, r) {
    for (var i = 0; i < this.blockers.length; i++) {
      var b = this.blockers[i];
      var nx = Math.max(b.x, Math.min(x, b.x + b.w));
      var ny = Math.max(b.y, Math.min(y, b.y + b.h));
      var dx = x - nx, dy = y - ny;
      if (dx * dx + dy * dy < r * r) return b;
    }
    return null;
  };

  // 视线是否被阻挡（p1->p2 与任意阻挡体相交）
  GameMap.prototype.lineBlocked = function (p1, p2) {
    for (var i = 0; i < this.blockers.length; i++) {
      if (DF.geom.segIntersectsRect(p1, p2, this.blockers[i])) return true;
    }
    return false;
  };

  // 子弹与墙的最近命中点（返回 t，无命中返回 1）
  GameMap.prototype.raycastWalls = function (p1, p2) {
    var best = 1;
    for (var i = 0; i < this.blockers.length; i++) {
      var b = this.blockers[i];
      var t = rayRectT(p1, p2, b);
      if (t != null && t < best) best = t;
    }
    return best;
  };

  function rayRectT(p1, p2, r) {
    // 线段与矩形四边相交的最小 t
    var edges = [
      [{x:r.x,y:r.y},        {x:r.x+r.w,y:r.y}],
      [{x:r.x+r.w,y:r.y},    {x:r.x+r.w,y:r.y+r.h}],
      [{x:r.x+r.w,y:r.y+r.h},{x:r.x,y:r.y+r.h}],
      [{x:r.x,y:r.y+r.h},    {x:r.x,y:r.y}]
    ];
    var best = null;
    for (var i = 0; i < 4; i++) {
      var t = segT(p1, p2, edges[i][0], edges[i][1]);
      if (t != null && (best == null || t < best)) best = t;
    }
    return best;
  }

  function segT(p1, p2, p3, p4) {
    var d = (p2.x - p1.x) * (p4.y - p3.y) - (p2.y - p1.y) * (p4.x - p3.x);
    if (d === 0) return null;
    var u = ((p3.x - p1.x) * (p4.y - p3.y) - (p3.y - p1.y) * (p4.x - p3.x)) / d;
    var v = ((p3.x - p1.x) * (p2.y - p1.y) - (p3.y - p1.y) * (p2.x - p1.x)) / d;
    if (u >= 0 && u <= 1 && v >= 0 && v <= 1) return u;
    return null;
  }

  DF.GameMap = GameMap;
})(window.DF = window.DF || {});

  </script>

  <script>
/* 伤害结算 —— 纯函数，护甲 / 爆头 / 距离衰减，可 node 单测
 *
 * resolveDamage(params) => result
 *   params: {
 *     baseDamage, headshot(bool), distance, range,
 *     health, vestDur, helmetDur,
 *     cfg (DF.CONFIG.combat), category
 *   }
 *   result: { health, vestDur, helmetDur, dealt, headshot, killed, bledTrigger }
 */
(function (DF) {
  'use strict';

  function resolveDamage(p) {
    var cfg = p.cfg;
    var dmg = p.baseDamage;

    // 距离衰减：超出有效射程后线性衰减，最低 40%
    if (p.distance > p.range) {
      var over = (p.distance - p.range) / p.range;
      dmg *= Math.max(0.4, 1 - over * 0.6);
    }

    var health = p.health;
    var vestDur = p.vestDur;
    var helmetDur = p.helmetDur;
    var headshot = !!p.headshot;

    if (headshot) {
      dmg *= cfg.headMultiplier;
      // 头盔吸收部分爆头溢出伤害
      if (helmetDur > 0) {
        var absorbedH = dmg * cfg.helmetAbsorb;
        var takenH = Math.min(helmetDur, absorbedH);
        helmetDur -= takenH;
        dmg -= takenH;
      }
    } else {
      // 护甲吸收躯干伤害
      if (vestDur > 0) {
        var absorbedB = dmg * cfg.armorAbsorb;
        var takenB = Math.min(vestDur, absorbedB);
        vestDur -= takenB;
        dmg -= takenB;
      }
    }

    dmg = Math.max(0, dmg);
    health -= dmg;

    var killed = health <= 0;
    // 躯干中弹且未致死可能触发流血
    var bledTrigger = !headshot && !killed && dmg > 0;

    return {
      health: Math.max(0, health),
      vestDur: Math.max(0, vestDur),
      helmetDur: Math.max(0, helmetDur),
      dealt: Math.round(dmg * 10) / 10,
      headshot: headshot,
      killed: killed,
      bledTrigger: bledTrigger
    };
  }

  // 命中部位判定：距瞄准点越近越可能爆头；近距离爆头率更高
  function rollHeadshot(rng, aimQuality, distance) {
    // aimQuality: 0~1，越高越精准
    var base = 0.10 + aimQuality * 0.18;
    if (distance < 160) base += 0.08;
    return rng.next() < base;
  }

  DF.combat = { resolveDamage: resolveDamage, rollHeadshot: rollHeadshot };
})(typeof window !== 'undefined' ? (window.DF = window.DF || {}) : (module.exports = {}));

  </script>

  <script>
/* 经济系统 —— 纯逻辑，可 node 单测 */
(function (DF) {
  'use strict';

  function Economy(cfg) {
    this.cfg = cfg;
    this.money = cfg.startMoney;
    this.lossStreak = 0;
  }

  Economy.prototype.canAfford = function (cost) { return this.money >= cost; };

  Economy.prototype.spend = function (cost) {
    if (this.money < cost) return false;
    this.money -= cost;
    return true;
  };

  Economy.prototype.add = function (amount) {
    this.money = Math.min(this.cfg.maxMoney, this.money + amount);
  };

  // 小局结算奖励
  Economy.prototype.awardRoundEnd = function (won) {
    if (won) {
      this.add(this.cfg.winReward);
      this.lossStreak = 0;
    } else {
      var loss = Math.min(this.cfg.lossMax, this.cfg.lossBase + this.lossStreak * this.cfg.lossStep);
      this.add(loss);
      this.lossStreak++;
    }
  };

  Economy.prototype.awardKill = function (category) {
    if (category === 'melee') this.add(this.cfg.meleeKillReward);
    else if (category === 'sniper') this.add(this.cfg.sniperKillReward);
    else this.add(this.cfg.killReward);
  };

  Economy.prototype.awardDecrypt = function () { this.add(this.cfg.decryptReward); };

  DF.Economy = Economy;

  <script>
/* 弹道：沿方向飞行，命中墙/干员即结算 */
(function (DF) {
  'use strict';

  function Bullet(opts) {
    this.x = opts.x; this.y = opts.y;
    this.px = opts.x; this.py = opts.y;       // 上一帧位置（用于连续碰撞）
    this.dir = opts.dir;                       // 归一化方向
    this.speed = opts.speed;
    this.owner = opts.owner;                   // 发射者 agent
    this.team = opts.team;
    this.weapon = opts.weapon;
    this.aimQuality = opts.aimQuality;
    this.life = opts.range / opts.speed + 0.05;
    this.dead = false;
  }

  Bullet.prototype.update = function (dt, game) {
    if (this.dead) return;
    this.px = this.x; this.py = this.y;
    this.x += this.dir.x * this.speed * dt;
    this.y += this.dir.y * this.speed * dt;
    this.life -= dt;
    if (this.life <= 0) { this.dead = true; return; }

    var p1 = { x: this.px, y: this.py }, p2 = { x: this.x, y: this.y };

    // 墙壁碰撞
    var wallT = game.map.raycastWalls(p1, p2);

    // 干员碰撞（找最近的、非同队、存活）
    var hitAgent = null, hitT = wallT;
    for (var i = 0; i < game.agents.length; i++) {
      var a = game.agents[i];
      if (!a.alive || a.team === this.team) continue;
      var hit = DF.geom.segCircle(p1, p2, { x: a.x, y: a.y }, a.radius);
      if (hit && hit.t < hitT) { hitT = hit.t; hitAgent = a; }
    }

    if (hitAgent) {
      this.dead = true;
      var hx = this.px + (this.x - this.px) * hitT;
      var hy = this.py + (this.y - this.py) * hitT;
      game.onBulletHitAgent(this, hitAgent, hx, hy);
    } else if (wallT < 1) {
      this.dead = true;
      var wx = this.px + (this.x - this.px) * wallT;
      var wy = this.py + (this.y - this.py) * wallT;
      game.particles.spark(wx, wy);
    }
  };

  Bullet.prototype.render = function (ctx) {
    ctx.strokeStyle = this.team === 'attacker' ? '#ffe27a' : '#ff8a6a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(this.px, this.py);
    ctx.lineTo(this.x, this.y);
    ctx.stroke();
  };

  DF.Bullet = Bullet;
})(window.DF = window.DF || {});

  </script>

  <script>
/* 干员实体 —— 玩家与 AI 共用。承载血量/护甲/武器/道具/移动/射击/近战 */
(function (DF) {
  'use strict';

  var V = DF.V;

  function Agent(game, opts) {
    this.game = game;
    this.cfg = DF.CONFIG.agent;
    this.team = opts.team;                 // 'attacker' | 'defender'
    this.isPlayer = !!opts.isPlayer;
    this.name = opts.name || '干员';
    this.color = opts.color || (this.team === 'attacker' ? '#4fc3f7' : '#ff7043');

    this.radius = this.cfg.radius;
    this.maxHealth = this.cfg.maxHealth;
    this.maxStamina = this.cfg.maxStamina;

    this.x = 0; this.y = 0; this.angle = 0;

    this.weapons = { primary: null, secondary: null, melee: null };
    this.slot = 'primary';
    this.items = [];

    this.kills = 0; this.deaths = 0;
    this.ai = null;

    this.resetState();
  }

  Agent.prototype.resetState = function () {
    this.health = this.maxHealth;
    this.stamina = this.maxStamina;
    this.alive = true;
    this.bleeding = 0;
    this.fireCd = 0;
    this.reloading = false;
    this.reloadEnd = 0;
    this.using = null;         // 正在使用的道具
    this.useEnd = 0;
    this.painkillerUntil = 0;
    this.adrenalineUntil = 0;
    this.lastShotTime = -99;
    this.moving = false;
    this.hitFlash = 0;
  };

  // 装备战备套装
  Agent.prototype.equipLoadout = function (loadout) {
    var self = this;
    function mkWeapon(id) {
      if (!id) return null;
      var def = DF.getWeapon(id);
      if (!def) return null;
      return { def: def, ammo: def.mag, reserve: def.reserve };
    }
    this.weapons.primary = mkWeapon(loadout.primary);
    this.weapons.secondary = mkWeapon(loadout.secondary);
    this.weapons.melee = mkWeapon('knife');

    // 护甲
    var helmet = DF.getHelmet(loadout.helmet);
    var vest = DF.getVest(loadout.vest);
    this.helmetId = helmet.id; this.helmetMax = helmet.durability; this.helmetDur = helmet.durability;
    this.vestId = vest.id; this.vestMax = vest.durability; this.vestDur = vest.durability;
    this.weight = helmet.weight + vest.weight;

    // 道具
    this.items = (loadout.items || []).map(function (id) {
      var d = DF.getItem(id);
      return d ? { def: d, charges: d.charges } : null;
    }).filter(Boolean);

    // 默认武器槽
    this.slot = this.weapons.primary ? 'primary' : (this.weapons.secondary ? 'secondary' : 'melee');
    this.loadout = loadout;
  };

  Agent.prototype.currentWeapon = function () { return this.weapons[this.slot]; };

  Agent.prototype.speed = function () {
    var base = this.cfg.walkSpeed * (1 - this.weight * 0.5);
    if (this.game.time < this.adrenalineUntil) base *= 1.15;
    return base;
  };
  Agent.prototype.sprintSpeed = function () {
    return this.cfg.sprintSpeed * (1 - this.weight * 0.5) * (this.game.time < this.adrenalineUntil ? 1.15 : 1);
  };

  // 尝试移动（分轴碰撞）
  Agent.prototype.tryMove = function (dx, dy, dt, sprint) {
    var spd = (sprint && this.stamina > 0) ? this.sprintSpeed() : this.speed();
    var len = Math.hypot(dx, dy);
    this.moving = len > 0.01;
    if (!this.moving) return false;
    dx /= len; dy /= len;
    var nx = this.x + dx * spd * dt;
    var ny = this.y + dy * spd * dt;
    var map = this.game.map;
    if (!map.circleBlocked(nx, this.y, this.radius)) this.x = nx;
    if (!map.circleBlocked(this.x, ny, this.radius)) this.y = ny;
    return sprint && this.stamina > 0;
  };

  Agent.prototype.switchSlot = function (slot) {
    if (!this.weapons[slot]) return;
    if (this.slot === slot) return;
    this.slot = slot;
    this.reloading = false;
  };

  // 开火（返回是否成功射击）
  Agent.prototype.tryShoot = function (aimAngle) {
    if (!this.alive || this.reloading || this.using) return false;
    var w = this.currentWeapon();
    if (!w) return false;
    if (this.game.time < this.fireCd) return false;

    var def = w.def;
    if (def.category === 'melee') { return this.meleeAttack(aimAngle); }

    if (w.ammo <= 0) {
      // 空仓自动换弹
      this.reload();
      return false;
    }

    this.fireCd = this.game.time + 60 / def.rpm;
    w.ammo--;
    this.lastShotTime = this.game.time;

    var pellets = def.pellets || 1;
    var spread = this.effectiveSpread(def);
    for (var i = 0; i < pellets; i++) {
      var a = aimAngle + (Math.random() - 0.5) * spread * 2;
      var dir = V.fromAngle(a);
      var muzzle = { x: this.x + dir.x * (this.radius + 6), y: this.y + dir.y * (this.radius + 6) };
      this.game.spawnBullet({
        x: muzzle.x, y: muzzle.y, dir: dir, speed: def.velocity,
        owner: this, team: this.team, weapon: def,
        range: def.range, aimQuality: this.aimQuality(spread)
      });
    }
    this.game.particles.muzzle(this.x + Math.cos(aimAngle) * (this.radius + 6), this.y + Math.sin(aimAngle) * (this.radius + 6), aimAngle);
    if (this.game.audio) this.game.audio.shot(def.category);
    return true;
  };

  Agent.prototype.effectiveSpread = function (def) {
    var s = def.spread;
    if (this.moving) s *= 1.9;
    if (this.game.time < this.painkillerUntil) s *= 0.6;
    // 连续射击轻微增散
    return s;
  };
  Agent.prototype.aimQuality = function (spread) {
    return V.clamp(1 - spread * 6, 0.1, 0.95);
  };

  Agent.prototype.meleeAttack = function (aimAngle) {
    var def = this.weapons.melee.def;
    if (this.game.time < this.fireCd) return false;
    this.fireCd = this.game.time + 60 / def.rpm;
    if (this.game.audio) this.game.audio.knife();
    // 找前方范围内敌人
    var reach = def.range + this.radius;
    var best = null, bestD = 1e9;
    for (var i = 0; i < this.game.agents.length; i++) {
      var t = this.game.agents[i];
      if (!t.alive || t.team === this.team) continue;
      var d = V.dist(this, t);
      if (d > reach + t.radius) continue;
      var toT = Math.atan2(t.y - this.y, t.x - this.x);
      if (Math.abs(V.wrapAngle(toT - aimAngle)) > 0.9) continue;
      if (d < bestD) { bestD = d; best = t; }
    }
    if (!best) return true;
    // 背刺判定：攻击者位于目标背后（目标朝向与 攻击者->目标 方向一致）
    var toVictim = { x: best.x - this.x, y: best.y - this.y };
    var victimFace = V.fromAngle(best.angle);
    var backstab = V.dot(V.norm(toVictim), victimFace) > 0.3;
    var dmg = backstab ? DF.CONFIG.combat.meleeBackstab : DF.CONFIG.combat.meleeFront;
    this.game.applyMelee(this, best, dmg, backstab);
    return true;
  };

  Agent.prototype.reload = function () {
    if (this.reloading || this.using) return;
    var w = this.currentWeapon();
    if (!w || w.def.category === 'melee') return;
    if (w.ammo >= w.def.mag || w.reserve <= 0) return;
    this.reloading = true;
    this.reloadEnd = this.game.time + w.def.reload;
    if (this.game.audio) this.game.audio.reload();
  };

  Agent.prototype.useItem = function (idOrKey) {
    if (this.using || this.reloading || !this.alive) return;
    var slot = null;
    for (var i = 0; i < this.items.length; i++) {
      var it = this.items[i];
      if (it.charges <= 0) continue;
      if (it.def.id === idOrKey || it.def.key === idOrKey) { slot = it; break; }
    }
    if (!slot) return;
    this.using = slot;
    this.useEnd = this.game.time + slot.def.useTime;
  };

  Agent.prototype.heal = function (amt) {
    this.health = Math.min(this.maxHealth, this.health + amt);
  };

  // 应用一次伤害结算结果（由 game 调用）
  Agent.prototype.applyDamageResult = function (res, attacker) {
    this.health = res.health;
    this.vestDur = res.vestDur;
    this.helmetDur = res.helmetDur;
    this.hitFlash = 0.12;
    if (res.bledTrigger && this.game.rng.chance(this.cfg.bleedChance)) {
      this.bleeding = 1;
    }
    if (!res.killed && this.game.audio && this.isPlayer) this.game.audio.hurt();
    if (res.killed) this.die(attacker);
  };

  Agent.prototype.die = function (attacker) {
    if (!this.alive) return;
    this.alive = false;
    this.deaths++;
    this.game.particles.blood(this.x, this.y, this.angle);
    if (this.game.audio) this.game.audio.death();
    this.game.onAgentDeath(this, attacker);
  };

  Agent.prototype.update = function (dt) {
    if (!this.alive) return;

    // 换弹完成
    if (this.reloading && this.game.time >= this.reloadEnd) {
      var w = this.currentWeapon();
      if (w.def.reloadPerShell) {
        var add = Math.min(1, w.reserve);
        w.ammo += add; w.reserve -= add;
        if (w.ammo < w.def.mag && w.reserve > 0) this.reloadEnd = this.game.time + w.def.reload;
        else this.reloading = false;
      } else {
        var need = w.def.mag - w.ammo;
        var take = Math.min(need, w.reserve);
        w.ammo += take; w.reserve -= take;
        this.reloading = false;
      }
    }

    // 道具使用完成
    if (this.using && this.game.time >= this.useEnd) {
      this.using.def.apply(this);
      this.using.charges--;
      if (this.game.audio) this.game.audio.buy();
      this.using = null;
    }

    // 流血
    if (this.bleeding > 0) {
      this.health -= this.cfg.bleedDps * dt;
      if (this.health <= 0) { this.health = 0; this.die(null); return; }
    }

    // 体力回复（非冲刺时）
    if (!this._sprintingThisFrame) {
      this.stamina = Math.min(this.maxStamina, this.stamina + this.cfg.staminaRegen * dt);
    }
    this._sprintingThisFrame = false;

    if (this.hitFlash > 0) this.hitFlash -= dt;
  };

  Agent.prototype.render = function (ctx, isLocalPlayer) {
    if (!this.alive) {
      // 尸体
      ctx.globalAlpha = 0.35;
      ctx.fillStyle = '#555';
      ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = 1;
      return;
    }
    var r = this.radius;
    // 朝向枪线
    ctx.strokeStyle = 'rgba(255,255,255,0.5)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(this.x + Math.cos(this.angle) * (r + 12), this.y + Math.sin(this.angle) * (r + 12));
    ctx.stroke();

    // 身体
    ctx.fillStyle = this.hitFlash > 0 ? '#ffffff' : this.color;
    ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI * 2); ctx.fill();

    // 队伍描边 / 本地玩家高亮
    ctx.lineWidth = isLocalPlayer ? 3 : 2;
    ctx.strokeStyle = isLocalPlayer ? '#fff' : (this.team === 'attacker' ? '#1565c0' : '#b71c1c');
    ctx.stroke();

    // 头盔环（表示有盔）
    if (this.helmetDur > 0) {
      ctx.strokeStyle = 'rgba(180,220,255,0.7)';
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(this.x, this.y, r - 4, 0, Math.PI * 2); ctx.stroke();
    }

    // 血条（头顶，AI/队友）
    if (!isLocalPlayer) {
      var bw = 28, bh = 4, bx = this.x - bw / 2, by = this.y - r - 12;
      ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = this.team === 'attacker' ? '#4caf50' : '#e53935';
      ctx.fillRect(bx, by, bw * (this.health / this.maxHealth), bh);
    }

    // 状态图标：流血 / 使用道具 / 破译
    if (this.bleeding > 0) {
      ctx.fillStyle = '#e53935';
      ctx.beginPath(); ctx.arc(this.x + r, this.y - r, 3, 0, Math.PI * 2); ctx.fill();
    }
    if (this.using) {
      ctx.fillStyle = '#66bb6a';
      ctx.fillRect(this.x - 10, this.y - r - 20, 20 * ((this.useEnd - this.game.time) / this.using.def.useTime <= 1 ? 1 - (this.useEnd - this.game.time) / this.using.def.useTime : 0), 3);
    }
  };

  DF.Agent = Agent;
})(window.DF = window.DF || {});

  </script>

  <script>
/* AI 行为：目标获取 → 交战 / 导航 / 换弹 / 治疗 / 破译·防守 */
(function (DF) {
  'use strict';

  var V = DF.V;

  function AI(agent, game) {
    this.a = agent;
    this.game = game;
    this.cfg = DF.CONFIG.ai;
    this.target = null;
    this.acquiredAt = 0;
    this.lostAt = 0;
    this.lastKnown = null;
    this.repositionUntil = 0;
    this.strafeDir = game.rng.sign();
    this.strafeUntil = 0;
    this.goal = null;
  }

  AI.prototype.preferredRange = function () {
    var w = this.a.currentWeapon();
    if (!w) return 200;
    switch (w.def.category) {
      case 'sniper': return 560;
      case 'marksman': return 460;
      case 'lmg': return 400;
      case 'ar': return 360;
      case 'shotgun': return 90;
      case 'pistol': return 200;
      default: return 220; // smg
    }
  };

  AI.prototype.canSee = function (t) {
    if (!t.alive) return false;
    var d = V.dist(this.a, t);
    if (d > this.cfg.viewDistance) return false;
    var toT = Math.atan2(t.y - this.a.y, t.x - this.a.x);
    if (Math.abs(V.wrapAngle(toT - this.a.angle)) > (this.cfg.fovDeg * Math.PI / 180) / 2) {
      // 视野外，但极近距离仍能察觉
      if (d > 90) return false;
    }
    return !this.game.map.lineBlocked({ x: this.a.x, y: this.a.y }, { x: t.x, y: t.y });
  };

  AI.prototype.acquire = function () {
    var best = null, bestD = 1e9;
    for (var i = 0; i < this.game.agents.length; i++) {
      var t = this.game.agents[i];
      if (!t.alive || t.team === this.a.team) continue;
      if (!this.canSee(t)) continue;
      var d = V.dist(this.a, t);
      if (d < bestD) { bestD = d; best = t; }
    }
    if (best) {
      if (this.target !== best) { this.target = best; this.acquiredAt = this.game.time; }
      this.lastKnown = { x: best.x, y: best.y };
    } else if (this.target) {
      // 目标失联
      if (!this.canSee(this.target)) {
        this.lostAt = this.game.time;
        this.target = null;
      }
    }
  };

  // 朝目标点转向（带转速与瞄准误差）
  AI.prototype.faceToward = function (px, py, dt, aimError) {
    var desired = Math.atan2(py - this.a.y, px - this.a.x);
    if (aimError) desired += (Math.random() - 0.5) * aimError * 2;
    this.a.angle = V.lerpAngle(this.a.angle, desired, Math.min(1, dt * 9));
  };

  // 转向朝向移动方向平滑
  AI.prototype.faceMove = function (dx, dy, dt) {
    if (Math.abs(dx) + Math.abs(dy) < 0.01) return;
    var desired = Math.atan2(dy, dx);
    this.a.angle = V.lerpAngle(this.a.angle, desired, Math.min(1, dt * 6));
  };

  // 带避障的寻路移动
  AI.prototype.moveToward = function (px, py, dt, sprint) {
    var dx = px - this.a.x, dy = py - this.a.y;
    var dist = Math.hypot(dx, dy);
    if (dist < 6) return;
    dx /= dist; dy /= dist;
    // whisker 避障：若前方碰撞，尝试偏转
    var look = this.a.radius + 26;
    var base = Math.atan2(dy, dx);
    var chosen = null;
    var offsets = [0, 0.5, -0.5, 1.0, -1.0, 1.6, -1.6, 2.3, -2.3];
    for (var i = 0; i < offsets.length; i++) {
      var a = base + offsets[i];
      var tx = this.a.x + Math.cos(a) * look;
      var ty = this.a.y + Math.sin(a) * look;
      if (!this.game.map.circleBlocked(tx, ty, this.a.radius)) { chosen = a; break; }
    }
    if (chosen == null) chosen = base;
    var mvx = Math.cos(chosen), mvy = Math.sin(chosen);
    this.a._sprintingThisFrame = this.a.tryMove(mvx, mvy, dt, sprint);
  };

  AI.prototype.update = function (dt) {
    var a = this.a;
    if (!a.alive) return;
    if (a.using) return; // 使用道具中不动

    this.acquire();

    // 低血且脱战：治疗
    if (!this.target && a.health < 45 && this.game.time > this.lostAt + 1.5) {
      if (this.tryHeal()) return;
    }

    // 换弹：无弹或（脱战且弹量低）
    var w = a.currentWeapon();
    if (w && w.def.category !== 'melee') {
      if (w.ammo <= 0) this.a.reload();
      else if (!this.target && w.ammo < w.def.mag * 0.4) this.a.reload();
    }

    // 进攻方：占据站点且无近身威胁时优先破译（一边警戒一边破译）
    if (a.team === 'attacker' && this.game.objective.inRange(a) && !this.game.objective.done) {
      var closeThreat = this.target && V.dist(a, this.target) < 260;
      if (!closeThreat) {
        this.game.objective.tick(dt, a, this.game);
        if (this.target) this.faceToward(this.target.x, this.target.y, dt, this.cfg.aimError);
        return;
      }
    }

    if (this.target) {
      this.combat(dt);
    } else {
      this.navigate(dt);
    }
  };

  AI.prototype.tryHeal = function () {
    for (var i = 0; i < this.a.items.length; i++) {
      var it = this.a.items[i];
      if (it.charges > 0 && (it.def.id === 'medbox' || it.def.id === 'dek' || it.def.id === 'cat')) {
        this.a.useItem(it.def.id);
        return true;
      }
    }
    return false;
  };

  AI.prototype.combat = function (dt) {
    var a = this.a, t = this.target;
    var d = V.dist(a, t);
    var pref = this.preferredRange();

    this.faceToward(t.x, t.y, dt, this.cfg.aimError + (a.moving ? 0.06 : 0));

    // 走位：保持偏好距离 + 侧移
    if (this.game.time > this.strafeUntil) {
      this.strafeDir = this.game.rng.sign();
      this.strafeUntil = this.game.time + this.game.rng.range(0.6, 1.4);
    }
    var toT = Math.atan2(t.y - a.y, t.x - a.x);
    var move = { x: 0, y: 0 };
    if (d > pref * 1.15) { move.x += Math.cos(toT); move.y += Math.sin(toT); }
    else if (d < pref * 0.7) { move.x -= Math.cos(toT); move.y -= Math.sin(toT); }
    // 侧移
    var perp = toT + Math.PI / 2 * this.strafeDir;
    move.x += Math.cos(perp) * 0.7; move.y += Math.sin(perp) * 0.7;

    var mlen = Math.hypot(move.x, move.y);
    if (mlen > 0.01) {
      var mvx = move.x / mlen, mvy = move.y / mlen;
      // 避障
      var look = a.radius + 22;
      if (this.game.map.circleBlocked(a.x + mvx * look, a.y + mvy * look, a.radius)) {
        var alt = Math.atan2(mvy, mvx) + this.strafeDir * 0.8;
        mvx = Math.cos(alt); mvy = Math.sin(alt);
      }
      a._sprintingThisFrame = a.tryMove(mvx, mvy, dt, false);
    }

    // 开火条件：反应时间已过 + 大致对准 + 有视线
    var aligned = Math.abs(V.wrapAngle(toT - a.angle)) < 0.14;
    var reacted = this.game.time > this.acquiredAt + this.cfg.reactionTime;
    if (aligned && reacted && this.canSee(t)) {
      a.tryShoot(a.angle);
    }
  };

  AI.prototype.navigate = function (dt) {
    var a = this.a;
    var goal = this.pickGoal();
    // 防守方到位后：巡逻/警戒最近失联点
    var target = this.lastKnown && this.game.time < this.lostAt + 4 ? this.lastKnown : goal;
    var d = V.dist(a, target);

    if (d > 40) {
      this.moveToward(target.x, target.y, dt, a.team === 'attacker' && d > 200);
      this.faceMove(target.x - a.x, target.y - a.y, dt);
    } else {
      // 到达目标区域
      if (a.team === 'attacker') {
        // 进攻方：尝试破译（若在站点范围且无敌人可见）
        if (this.game.objective.inRange(a)) {
          this.game.objective.tick(dt, a, this.game);
        } else {
          this.wander(dt);
        }
      } else {
        // 防守方：警戒站点方向，缓慢巡逻
        this.wander(dt);
        this.faceToward(this.game.map.site.x, this.game.map.site.y, dt, 0.3);
      }
    }
  };

  AI.prototype.pickGoal = function () {
    var site = this.game.map.site;
    if (this.a.team === 'attacker') {
      // 稍微散开逼近站点
      if (!this.goal) this.goal = { x: site.x + this.game.rng.range(-70, 70), y: site.y + this.game.rng.range(20, 90) };
      return this.goal;
    } else {
      if (!this.goal) this.goal = { x: site.x + this.game.rng.range(-120, 120), y: site.y + this.game.rng.range(-60, 90) };
      return this.goal;
    }
  };

  AI.prototype.wander = function (dt) {
    if (this.game.time > this.repositionUntil) {
      this.repositionUntil = this.game.time + this.game.rng.range(1.5, 3.5);
      var site = this.game.map.site;
      this._wp = { x: site.x + this.game.rng.range(-140, 140), y: site.y + this.game.rng.range(-90, 110) };
    }
    if (this._wp) this.moveToward(this._wp.x, this._wp.y, dt, false);
  };

  DF.AI = AI;
})(window.DF = window.DF || {});

  </script>

  <script>
/* 战斗 HUD：血量 / 护甲 / 体力 / 弹药 / 道具 / 比分 / 计时 / 击杀信息 / 目标提示 / 计分板 */
(function (DF) {
  'use strict';

  function HUD() {}

  function bar(ctx, x, y, w, h, pct, color, bg) {
    ctx.fillStyle = bg || 'rgba(0,0,0,0.55)';
    ctx.fillRect(x, y, w, h);
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w * Math.max(0, Math.min(1, pct)), h);
    ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1;
    ctx.strokeRect(x + 0.5, y + 0.5, w - 1, h - 1);
  }

  HUD.prototype.render = function (ctx, game) {
    var p = game.player, W = game.map.width, H = game.map.height;
    ctx.textAlign = 'left';

    // ——— 顶部比分 / 计时 ———
    ctx.fillStyle = 'rgba(10,12,16,0.72)';
    ctx.fillRect(W / 2 - 150, 8, 300, 46);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#4fc3f7'; ctx.font = 'bold 26px Consolas, monospace';
    ctx.fillText(String(game.attackerWins), W / 2 - 70, 40);
    ctx.fillStyle = '#ff7043';
    ctx.fillText(String(game.defenderWins), W / 2 + 70, 40);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Consolas, monospace';
    var clock = game.state === 'buy' ? game.buyTimer : game.roundClock;
    ctx.fillText(Math.max(0, Math.ceil(clock)) + 's', W / 2, 36);
    ctx.fillStyle = '#888'; ctx.font = '11px "Microsoft YaHei", sans-serif';
    ctx.fillText('第 ' + game.round + ' 局 · 先胜 ' + DF.CONFIG.match.roundsToWin + ' 局', W / 2, 51);
    ctx.textAlign = 'left';

    // 状态提示
    if (game.state === 'buy') {
      ctx.textAlign = 'center';
      ctx.fillStyle = '#ffca28'; ctx.font = 'bold 15px "Microsoft YaHei", sans-serif';
      ctx.fillText('购买阶段 · 选择战备后按「出击」或等待倒计时', W / 2, 74);
      ctx.textAlign = 'left';
    }

    // ——— 左下 玩家状态 ———
    var bx = 20, by = H - 96;
    if (p.alive) {
      // 血量
      ctx.fillStyle = '#fff'; ctx.font = 'bold 13px "Microsoft YaHei", sans-serif';
      ctx.fillText('生命 ' + Math.ceil(p.health), bx, by - 4);
      bar(ctx, bx, by, 180, 12, p.health / p.maxHealth, p.bleeding > 0 ? '#e53935' : '#43a047');
      // 护甲
      ctx.fillStyle = '#bbdefb'; ctx.fillText('护甲 ' + Math.ceil(p.vestDur) + '/' + p.vestMax, bx, by + 30);
      bar(ctx, bx, by + 34, 180, 9, p.vestMax ? p.vestDur / p.vestMax : 0, '#42a5f5');
      // 头盔
      ctx.fillStyle = '#c5cae9'; ctx.fillText('头盔 ' + Math.ceil(p.helmetDur), bx + 190, by + 30);
      bar(ctx, bx + 190, by + 34, 90, 9, p.helmetMax ? p.helmetDur / p.helmetMax : 0, '#7e57c2');
      // 体力
      bar(ctx, bx, by + 50, 180, 6, p.stamina / p.maxStamina, '#ffb300');

      // 状态标签
      var tags = [];
      if (p.bleeding > 0) tags.push('流血');
      if (game.time < p.painkillerUntil) tags.push('止疼');
      if (game.time < p.adrenalineUntil) tags.push('兴奋');
      if (tags.length) { ctx.fillStyle = '#ff8a65'; ctx.font = '12px "Microsoft YaHei", sans-serif'; ctx.fillText(tags.join(' · '), bx, by + 70); }
    } else {
      ctx.fillStyle = '#ef5350'; ctx.font = 'bold 18px "Microsoft YaHei", sans-serif';
      ctx.fillText('已阵亡 · 观战队友', bx, by + 20);
    }

    // ——— 右下 武器 / 弹药 ———
    var w = p.currentWeapon();
    if (w) {
      var rx = W - 20, ry = H - 30;
      ctx.textAlign = 'right';
      ctx.fillStyle = '#fff'; ctx.font = 'bold 20px "Microsoft YaHei", sans-serif';
      ctx.fillText(w.def.name, rx, ry - 28);
      if (w.def.category === 'melee') {
        ctx.fillStyle = '#b0bec5'; ctx.font = 'bold 30px Consolas, monospace';
        ctx.fillText('近战', rx, ry);
      } else {
        ctx.fillStyle = p.reloading ? '#ffca28' : '#fff';
        ctx.font = 'bold 34px Consolas, monospace';
        ctx.fillText(w.ammo + ' / ' + w.reserve, rx, ry);
        if (p.reloading) { ctx.fillStyle = '#ffca28'; ctx.font = '13px "Microsoft YaHei", sans-serif'; ctx.fillText('换弹中…', rx, ry - 44); }
      }
      // 武器槽提示
      ctx.fillStyle = '#78909c'; ctx.font = '11px "Microsoft YaHei", sans-serif';
      ctx.fillText('[Q] 切枪 · [R] 换弹 · [V] 近战', rx, ry + 16);
      ctx.textAlign = 'left';
    }

    // ——— 道具栏 ———
    var ix = 320, iy = H - 42;
    for (var i = 0; i < p.items.length; i++) {
      var it = p.items[i];
      ctx.fillStyle = it.charges > 0 ? 'rgba(38,50,56,0.9)' : 'rgba(38,50,56,0.35)';
      ctx.fillRect(ix, iy, 118, 30);
      ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.strokeRect(ix + 0.5, iy + 0.5, 118, 30);
      ctx.fillStyle = '#ffca28'; ctx.font = 'bold 12px Consolas, monospace';
      ctx.fillText('[' + it.def.key + ']', ix + 6, iy + 20);
      ctx.fillStyle = it.charges > 0 ? '#fff' : '#777'; ctx.font = '11px "Microsoft YaHei", sans-serif';
      ctx.fillText(it.def.name.slice(0, 7), ix + 30, iy + 13);
      ctx.fillStyle = '#90a4ae';
      ctx.fillText('×' + it.charges, ix + 30, iy + 26);
      ix += 124;
    }

    // ——— 资金 ———
    ctx.fillStyle = '#66bb6a'; ctx.font = 'bold 18px Consolas, monospace';
    ctx.fillText('$ ' + game.economy.money, 20, 30);

    // ——— 目标提示 ———
    if (game.state === 'live') {
      ctx.textAlign = 'center';
      if (game.objective.done) {
        ctx.fillStyle = '#66bb6a'; ctx.font = 'bold 16px "Microsoft YaHei", sans-serif';
        ctx.fillText('密钥破译完成！', W / 2, 100);
      } else if (game.objective.inRange(p) && p.alive) {
        ctx.fillStyle = '#ffee58'; ctx.font = 'bold 15px "Microsoft YaHei", sans-serif';
        ctx.fillText('按住 [F] 破译密钥  ' + Math.floor(game.objective.progress * 100) + '%', W / 2, 100);
      } else if (game.objective.progress > 0) {
        ctx.fillStyle = '#ffca28'; ctx.font = '13px "Microsoft YaHei", sans-serif';
        ctx.fillText('密钥破译进度 ' + Math.floor(game.objective.progress * 100) + '%', W / 2, 100);
      }
      ctx.textAlign = 'left';
    }

    // ——— 击杀信息（右上）———
    var ky = 70;
    ctx.textAlign = 'right';
    ctx.font = '13px "Microsoft YaHei", sans-serif';
    for (var k = 0; k < game.killfeed.length; k++) {
      var e = game.killfeed[k];
      ctx.globalAlpha = Math.min(1, e.life);
      ctx.fillStyle = e.killerTeam === 'attacker' ? '#4fc3f7' : '#ff7043';
      var txt = e.killer + '  ▸ [' + e.weapon + '] ▸  ';
      ctx.fillText(e.killer + '  『' + e.weapon + '』 ', W - 20 - measure(ctx, e.victim), ky);
      ctx.fillStyle = '#ef9a9a';
      ctx.fillText(e.victim, W - 20, ky);
      ky += 20;
    }
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';

    // 存活人数
    ctx.fillStyle = '#4fc3f7'; ctx.font = 'bold 13px Consolas, monospace';
    ctx.fillText('进攻存活 ' + count(game, 'attacker'), 20, 50);
    ctx.fillStyle = '#ff7043';
    ctx.fillText('防守存活 ' + count(game, 'defender'), 20, 68);
  };

  function measure(ctx, s) { return ctx.measureText(s).width; }
  function count(game, team) {
    var n = 0; for (var i = 0; i < game.agents.length; i++) if (game.agents[i].team === team && game.agents[i].alive) n++; return n;
  }

  // 计分板（按住 Tab）
  HUD.prototype.renderScoreboard = function (ctx, game) {
    var W = game.map.width, H = game.map.height;
    ctx.fillStyle = 'rgba(8,10,14,0.9)';
    ctx.fillRect(W / 2 - 280, 120, 560, 380);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.strokeRect(W / 2 - 280, 120, 560, 380);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffca28'; ctx.font = 'bold 22px "Microsoft YaHei", sans-serif';
    ctx.fillText('计分板  ' + game.attackerWins + ' : ' + game.defenderWins, W / 2, 156);

    var y = 200;
    drawTeam(ctx, game, 'attacker', '进攻方 · 灵萧队', '#4fc3f7', W / 2 - 260, y);
    drawTeam(ctx, game, 'defender', '防守方 · 敌方小队', '#ff7043', W / 2 - 260, y + 160);
    ctx.textAlign = 'left';
  };

  function drawTeam(ctx, game, team, title, color, x, y) {
    ctx.textAlign = 'left';
    ctx.fillStyle = color; ctx.font = 'bold 16px "Microsoft YaHei", sans-serif';
    ctx.fillText(title, x, y);
    ctx.fillStyle = '#78909c'; ctx.font = '12px Consolas, monospace';
    ctx.fillText('干员', x + 10, y + 24);
    ctx.fillText('击杀', x + 300, y + 24);
    ctx.fillText('阵亡', x + 380, y + 24);
    ctx.fillText('状态', x + 450, y + 24);
    var row = y + 46;
    for (var i = 0; i < game.agents.length; i++) {
      var a = game.agents[i];
      if (a.team !== team) continue;
      ctx.fillStyle = a === game.player ? '#fff' : '#cfd8dc';
      ctx.font = (a === game.player ? 'bold ' : '') + '14px "Microsoft YaHei", sans-serif';
      ctx.fillText((a === game.player ? '★ ' : '  ') + a.name, x + 10, row);
      ctx.fillStyle = '#eee'; ctx.font = '14px Consolas, monospace';
      ctx.fillText(String(a.kills), x + 306, row);
      ctx.fillText(String(a.deaths), x + 386, row);
      ctx.fillStyle = a.alive ? '#66bb6a' : '#ef5350';
      ctx.fillText(a.alive ? '存活' : '阵亡', x + 450, row);
      row += 28;
    }
  }

  DF.HUD = HUD;
})(window.DF = window.DF || {});

  <script>
/* 购买阶段界面（Canvas 绘制 + 鼠标点击）：15 套战备按价位分档展示 */
(function (DF) {
  'use strict';

  function BuyMenu() {
    this.isOpen = false;
    this.ready = false;
    this.cards = [];
    this.readyBtn = null;
  }

  BuyMenu.prototype.open = function () { this.isOpen = true; this.ready = false; };
  BuyMenu.prototype.close = function () { this.isOpen = false; };

  // 计算卡片布局（渲染与点击共用）
  BuyMenu.prototype._layout = function (game) {
    var W = game.map.width, H = game.map.height;
    var tiers = [200, 1000, 2500, 4000, 6000];
    var colW = 232, cardW = 216, cardH = 116, gapY = 12;
    var totalW = tiers.length * colW;
    var startX = (W - totalW) / 2 + (colW - cardW) / 2;
    var startY = 150;
    this.cards = [];
    for (var c = 0; c < tiers.length; c++) {
      var list = DF.LOADOUTS.filter(function (l) { return l.cost === tiers[c]; });
      for (var r = 0; r < list.length; r++) {
        this.cards.push({
          loadout: list[r],
          rect: { x: startX + c * colW, y: startY + r * (cardH + gapY), w: cardW, h: cardH }
        });
      }
    }
    this.readyBtn = { x: W / 2 - 110, y: H - 78, w: 220, h: 46 };
    this._tiersX = tiers.map(function (_, i) { return startX + i * colW + cardW / 2; });
    this._tiers = tiers;
    this._startY = startY;
  };

  BuyMenu.prototype.update = function (game) {
    if (!this.isOpen) return;
    this._layout(game);
    var m = game.input.mouse;
    if (game.input.justClicked()) {
      for (var i = 0; i < this.cards.length; i++) {
        if (hit(m, this.cards[i].rect)) { game.buyLoadout(this.cards[i].loadout); return; }
      }
      if (hit(m, this.readyBtn)) { this.ready = true; return; }
    }
    if (game.input.justPressed('enter') || game.input.justPressed(' ')) this.ready = true;
  };

  function hit(m, r) { return m.x >= r.x && m.x <= r.x + r.w && m.y >= r.y && m.y <= r.y + r.h; }

  BuyMenu.prototype.render = function (ctx, game) {
    if (!this.isOpen) return;
    // 自足：即便本帧 update() 尚未运行（如刚从菜单点击进入购买），也先算好布局，
    // 避免 render 依赖 update 先执行而读到未初始化的字段。
    this._layout(game);
    var W = game.map.width, H = game.map.height, m = game.input.mouse;
    ctx.fillStyle = 'rgba(8,11,16,0.86)'; ctx.fillRect(0, 0, W, H);

    // 标题
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffca28'; ctx.font = 'bold 30px "Microsoft YaHei", sans-serif';
    ctx.fillText('战 备 购 买', W / 2, 60);
    ctx.fillStyle = '#66bb6a'; ctx.font = 'bold 20px Consolas, monospace';
    ctx.fillText('资金  $ ' + game.economy.money, W / 2, 92);
    ctx.fillStyle = '#90a4ae'; ctx.font = '13px "Microsoft YaHei", sans-serif';
    ctx.fillText('点击卡片购买（可反复切换，自动退还） · 当前：' + (game.player.loadout ? game.player.loadout.name : '无'), W / 2, 116);

    // 价位表头
    ctx.font = 'bold 15px Consolas, monospace';
    for (var t = 0; t < this._tiers.length; t++) {
      ctx.fillStyle = '#546e7a';
      ctx.fillText('$' + this._tiers[t], this._tiersX[t], this._startY - 12);
    }

    // 卡片
    for (var i = 0; i < this.cards.length; i++) {
      this._card(ctx, game, this.cards[i], m);
    }

    // 出击按钮
    var rb = this.readyBtn, over = hit(m, rb);
    ctx.fillStyle = over ? '#43a047' : '#2e7d32';
    ctx.fillRect(rb.x, rb.y, rb.w, rb.h);
    ctx.strokeStyle = '#66bb6a'; ctx.lineWidth = 2; ctx.strokeRect(rb.x, rb.y, rb.w, rb.h);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px "Microsoft YaHei", sans-serif';
    ctx.fillText('出 击  (' + Math.ceil(game.buyTimer) + 's)', W / 2, rb.y + 30);
    ctx.textAlign = 'left';
  };

  BuyMenu.prototype._card = function (ctx, game, card, m) {
    var l = card.loadout, r = card.rect;
    var afford = game.economy.money + game.spentThisRound >= l.cost;
    var selected = game.player.loadout && game.player.loadout.id === l.id;
    var over = hit(m, r);

    ctx.fillStyle = selected ? 'rgba(46,125,50,0.5)' : (over && afford ? 'rgba(55,71,79,0.95)' : 'rgba(30,40,48,0.92)');
    ctx.fillRect(r.x, r.y, r.w, r.h);
    ctx.strokeStyle = selected ? '#66bb6a' : (afford ? 'rgba(255,255,255,0.18)' : 'rgba(255,80,80,0.35)');
    ctx.lineWidth = selected ? 2.5 : 1.5;
    ctx.strokeRect(r.x + 0.5, r.y + 0.5, r.w - 1, r.h - 1);

    ctx.textAlign = 'left';
    ctx.fillStyle = afford ? '#fff' : '#8d6e63';
    ctx.font = 'bold 16px "Microsoft YaHei", sans-serif';
    ctx.fillText(l.name, r.x + 12, r.y + 26);

    ctx.fillStyle = '#ffca28'; ctx.font = 'bold 13px Consolas, monospace';
    ctx.textAlign = 'right';
    ctx.fillText('$' + l.cost, r.x + r.w - 10, r.y + 24);
    ctx.textAlign = 'left';

    ctx.fillStyle = '#90caf9'; ctx.font = '11px "Microsoft YaHei", sans-serif';
    ctx.fillText(l.tag, r.x + 12, r.y + 44);

    // 详情
    var prim = l.primary ? DF.getWeapon(l.primary).name : '无主武器';
    var sec = l.secondary ? DF.getWeapon(l.secondary).name : '—';
    ctx.fillStyle = '#cfd8dc'; ctx.font = '11px "Microsoft YaHei", sans-serif';
    ctx.fillText('主：' + prim, r.x + 12, r.y + 64);
    ctx.fillText('副：' + sec, r.x + 12, r.y + 80);
    ctx.fillStyle = '#b0bec5';
    ctx.fillText('甲：' + DF.getVest(l.vest).name + ' · ' + DF.getHelmet(l.helmet).name, r.x + 12, r.y + 96);
    var items = (l.items || []).map(function (id) { return DF.getItem(id).name.replace(/（.*）/, ''); }).join('·');
    ctx.fillStyle = '#80cbc4';
    ctx.fillText(items.slice(0, 18), r.x + 12, r.y + 110);

    if (selected) {
      ctx.fillStyle = '#66bb6a'; ctx.font = 'bold 11px "Microsoft YaHei", sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText('✓ 已选', r.x + r.w - 10, r.y + 44);
      ctx.textAlign = 'left';
    }
  };

  DF.BuyMenu = BuyMenu;
})(window.DF = window.DF || {});

  <script>
/* 对局主控：状态机（购买/战斗/小局结算/整场结算）+ 主循环 + 玩家操控 + 渲染 */
(function (DF) {
  'use strict';

  var V = DF.V;
  var C = DF.CONFIG;

  function Game(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.map = new DF.GameMap(C);
    canvas.width = this.map.width;
    canvas.height = this.map.height;

    this.rng = new DF.RNG(20260701);
    this.input = new DF.Input(canvas);
    this.audio = new DF.Audio();
    this.particles = new DF.Particles();
    this.economy = new DF.Economy(C.economy);
    this.objective = new DF.Objective(C.objective, this.map.site);
    this.hud = new DF.HUD();
    this.buyMenu = new DF.BuyMenu();

    this.time = 0;
    this.state = 'menu';        // menu|buy|live|roundend|matchend
    this.agents = [];
    this.bullets = [];
    this.killfeed = [];
    this.attackerWins = 0;
    this.defenderWins = 0;
    this.round = 0;
    this.roundClock = 0;
    this.buyTimer = 0;
    this.roundEndTimer = 0;
    this.roundResult = null;
    this.spentThisRound = 0;
    this.banner = null;

    this._createAgents();
    this._lastT = 0;
  }

  // ————— 初始化干员 —————
  Game.prototype._createAgents = function () {
    var self = this;
    this.player = new DF.Agent(this, { team: 'attacker', isPlayer: true, name: '灵萧·蝶', color: '#4fc3f7' });

    this.teammates = [
      new DF.Agent(this, { team: 'attacker', name: '破晓', color: '#4dd0e1' }),
      new DF.Agent(this, { team: 'attacker', name: '爱缠龙', color: '#81d4fa' })
    ];
    this.enemies = [
      new DF.Agent(this, { team: 'defender', name: '超级凯666', color: '#ff7043' }),
      new DF.Agent(this, { team: 'defender', name: '夜枭', color: '#ff8a65' }),
      new DF.Agent(this, { team: 'defender', name: '磐石', color: '#ffab91' })
    ];
    this.teammates.concat(this.enemies).forEach(function (a) { a.ai = new DF.AI(a, self); });
    this.agents = [this.player].concat(this.teammates, this.enemies);
  };

  // ————— 开始整场 —————
  Game.prototype.startMatch = function () {
    this.attackerWins = 0;
    this.defenderWins = 0;
    this.round = 0;
    this.economy.money = C.economy.startMoney;
    this.economy.lossStreak = 0;
    this.startRound();
  };

  // ————— 开始小局（购买阶段）—————
  Game.prototype.startRound = function () {
    this.round++;
    this.objective.reset();
    this.bullets = [];
    this.spentThisRound = 0;

    // 出生 + 重置
    var self = this;
    function place(a, spawn) {
      a.x = spawn.x; a.y = spawn.y;
      a.angle = a.team === 'attacker' ? -Math.PI / 2 : Math.PI / 2;
      a.resetState();
      if (a.ai) { a.ai.target = null; a.ai.goal = null; a.ai.lastKnown = null; }
    }
    place(this.player, this.map.attackerSpawns[1]);
    place(this.teammates[0], this.map.attackerSpawns[0]);
    place(this.teammates[1], this.map.attackerSpawns[2]);
    for (var i = 0; i < this.enemies.length; i++) place(this.enemies[i], this.map.defenderSpawns[i]);

    // 玩家默认免费战备（可在购买阶段替换）
    this.player.equipLoadout(DF.getLoadout('quanzidong'));

    // AI 自动战备（随回合升级）
    var budget = Math.min(6000, 800 + this.round * 1100);
    this.teammates.concat(this.enemies).forEach(function (a) {
      a.equipLoadout(self._pickAILoadout(budget));
    });

    this.state = 'buy';
    this.buyTimer = C.match.buyTime;
    this.buyMenu.open();
    this.banner = null;
  };

  Game.prototype._pickAILoadout = function (budget) {
    var affordable = DF.LOADOUTS.filter(function (l) { return l.cost <= budget && l.primary; });
    if (!affordable.length) affordable = DF.LOADOUTS.filter(function (l) { return l.cost <= budget; });
    // 偏好较高价位
    affordable.sort(function (a, b) { return b.cost - a.cost; });
    var top = affordable.slice(0, Math.max(1, Math.ceil(affordable.length / 2)));
    return this.rng.pick(top);
  };

  // 玩家购买（购买阶段可自由切换，自动退还上次花费）
  Game.prototype.buyLoadout = function (l) {
    if (this.state !== 'buy') return false;
    this.economy.money += this.spentThisRound; // 退还
    if (this.economy.money >= l.cost) {
      this.economy.money -= l.cost;
      this.spentThisRound = l.cost;
      this.player.equipLoadout(l);
      if (this.audio) this.audio.buy();
      return true;
    } else {
      this.economy.money -= this.spentThisRound; // 撤销退还
      if (this.audio) this.audio.click();
      return false;
    }
  };

  Game.prototype.beginLive = function () {
    this.state = 'live';
    this.roundClock = C.match.roundTime;
    this.buyMenu.close();
  };

  // ————— 主循环 —————
  Game.prototype.frame = function (t) {
    var dt = Math.min(0.05, (t - this._lastT) / 1000 || 0);
    this._lastT = t;
    try {
      this.update(dt);
      this.render();
      this.input.endFrame();
    } catch (err) {
      // 任何运行时错误都可见化，而非静默停摆
      if (typeof window !== 'undefined' && window.__report) {
        window.__report('主循环崩溃（state=' + this.state + '）：\n' + (err && err.stack || err));
      }
      console.error(err);
      return; // 停止循环，避免刷屏
    }
    var self = this;
    requestAnimationFrame(function (tt) { self.frame(tt); });
  };

  Game.prototype.update = function (dt) {
    this.time += dt; // 模拟时钟由更新步进拥有（保证逻辑自洽、可无头测试）
    if (this.state === 'menu') { this._menuInput(); return; }
    if (this.state === 'matchend') { this._endInput(); this.particles.update(dt); return; }

    if (this.state === 'buy') {
      this.buyTimer -= dt;
      this.buyMenu.update(this);
      if (this.buyTimer <= 0 || this.buyMenu.ready) this.beginLive();
      // 购买阶段允许原地转向观察
      this._aimPlayer();
      this.particles.update(dt);
      return;
    }

    if (this.state === 'roundend') {
      this.roundEndTimer -= dt;
      this._updateEntities(dt, true); // 结算展示仍渲染但冻结逻辑
      if (this.roundEndTimer <= 0) this._nextRound();
      return;
    }

    // live
    this.roundClock -= dt;
    this._controlPlayer(dt);
    this._updateEntities(dt, false);
    this.objective.endFrame();
    this._checkWin();
  };

  Game.prototype._updateEntities = function (dt, frozen) {
    var i;
    if (!frozen) {
      for (i = 0; i < this.teammates.length; i++) if (this.teammates[i].ai) this.teammates[i].ai.update(dt);
      for (i = 0; i < this.enemies.length; i++) if (this.enemies[i].ai) this.enemies[i].ai.update(dt);
      for (i = 0; i < this.agents.length; i++) this.agents[i].update(dt);
      for (i = 0; i < this.bullets.length; i++) this.bullets[i].update(dt, this);
      this.bullets = this.bullets.filter(function (b) { return !b.dead; });
    }
    this.particles.update(dt);
    // 淡出击杀信息
    this.killfeed = this.killfeed.filter(function (k) { k.life -= dt; return k.life > 0; });
  };

  // ————— 玩家操控 —————
  Game.prototype._aimPlayer = function () {
    var p = this.player;
    if (!p.alive) return;
    p.angle = Math.atan2(this.input.mouse.y - p.y, this.input.mouse.x - p.x);
  };

  Game.prototype._controlPlayer = function (dt) {
    var p = this.player, inp = this.input;
    if (!p.alive) return;
    this._aimPlayer();

    // 移动
    var dx = 0, dy = 0;
    if (inp.down('w')) dy -= 1;
    if (inp.down('s')) dy += 1;
    if (inp.down('a')) dx -= 1;
    if (inp.down('d')) dx += 1;
    var sprint = inp.down('shift') && (dx || dy);
    if (!p.using) {
      var didSprint = p.tryMove(dx, dy, dt, sprint);
      p._sprintingThisFrame = didSprint;
      if (didSprint) p.stamina = Math.max(0, p.stamina - p.cfg.staminaDrain * dt);
    } else { p.moving = false; }

    // 武器切换
    if (inp.justPressed('q')) p.switchSlot(p.slot === 'primary' ? 'secondary' : 'primary');

    // 近战快攻（V）
    if (inp.justPressed('v')) p.meleeAttack(p.angle);

    // 换弹
    if (inp.justPressed('r')) p.reload();

    // 道具
    ['1', '2', '3', '4', '5'].forEach(function (k) {
      if (inp.justPressed(k)) p.useItem(k);
    });

    // 破译（按住 F 且在站点范围）
    if (inp.down('f') && this.objective.inRange(p) && !p.using) {
      this.objective.tick(dt, p, this);
    }

    // 射击
    var w = p.currentWeapon();
    if (w && w.def.category !== 'melee') {
      if (w.def.auto ? inp.mouseDown : inp.justClicked()) {
        if (this.audio) this.audio.resume();
        p.tryShoot(p.angle);
      }
    }
  };

  // ————— 战斗回调 —————
  Game.prototype.spawnBullet = function (opts) { this.bullets.push(new DF.Bullet(opts)); };

  Game.prototype.onBulletHitAgent = function (bullet, victim, hx, hy) {
    var dist = V.dist({ x: bullet.owner.x, y: bullet.owner.y }, { x: hx, y: hy });
    var headshot = DF.combat.rollHeadshot(this.rng, bullet.aimQuality, dist);
    var res = DF.combat.resolveDamage({
      baseDamage: bullet.weapon.damage,
      headshot: headshot,
      distance: dist,
      range: bullet.weapon.range,
      health: victim.health,
      vestDur: victim.vestDur,
      helmetDur: victim.helmetDur,
      cfg: C.combat,
      category: bullet.weapon.category
    });
    this.particles.blood(hx, hy, bullet.dir ? Math.atan2(bullet.dir.y, bullet.dir.x) : 0);
    this.particles.floater(hx, hy - 8, (res.headshot ? '爆头 ' : '') + Math.round(res.dealt), res.headshot ? '#ff5252' : '#ffd54f');
    if (this.audio && bullet.owner.isPlayer) { res.headshot ? this.audio.headshot() : this.audio.hit(); }
    victim.applyDamageResult(res, bullet.owner);
  };

  Game.prototype.applyMelee = function (attacker, victim, dmg, backstab) {
    var res;
    if (backstab || dmg >= 999) {
      res = { health: 0, vestDur: victim.vestDur, helmetDur: victim.helmetDur, dealt: victim.health, headshot: false, killed: true, bledTrigger: false };
    } else {
      var h = Math.max(0, victim.health - dmg);
      res = { health: h, vestDur: victim.vestDur, helmetDur: victim.helmetDur, dealt: dmg, headshot: false, killed: h <= 0, bledTrigger: false };
    }
    this.particles.floater(victim.x, victim.y - 8, (backstab ? '背刺 ' : '') + Math.round(res.dealt), '#ff8a80');
    victim.applyDamageResult(res, attacker);
  };

  Game.prototype.onAgentDeath = function (victim, attacker) {
    var wname = attacker ? (attacker.currentWeapon() ? attacker.currentWeapon().def.name : '') : '流血';
    var cat = attacker && attacker.currentWeapon() ? attacker.currentWeapon().def.category : '';
    this.killfeed.unshift({
      killer: attacker ? attacker.name : '——',
      victim: victim.name,
      weapon: wname,
      headshot: false,
      killerTeam: attacker ? attacker.team : 'none',
      life: 5
    });
    if (this.killfeed.length > 5) this.killfeed.pop();

    if (attacker) {
      attacker.kills++;
      // 玩家击杀奖励
      if (attacker.isPlayer) this.economy.awardKill(cat === 'melee' ? 'melee' : cat === 'sniper' ? 'sniper' : 'gun');
    }
  };

  // ————— 胜负判定 —————
  Game.prototype._aliveCount = function (team) {
    var n = 0;
    for (var i = 0; i < this.agents.length; i++) if (this.agents[i].team === team && this.agents[i].alive) n++;
    return n;
  };

  Game.prototype._checkWin = function () {
    if (this.state !== 'live') return;
    var atk = this._aliveCount('attacker');
    var def = this._aliveCount('defender');

    if (this.objective.done) { this._endRound('attacker', '密钥破译成功'); return; }
    if (def === 0) { this._endRound('attacker', '全歼防守方'); return; }
    if (atk === 0) { this._endRound('defender', '进攻方被团灭'); return; }
    if (this.roundClock <= 0) { this._endRound('defender', '防守方成功拖延时间'); return; }
  };

  Game.prototype._endRound = function (winner, reason) {
    this.state = 'roundend';
    this.roundEndTimer = C.match.roundEndDelay;
    this.roundResult = { winner: winner, reason: reason };

    var playerWon = winner === 'attacker';
    // 经济结算
    if (playerWon && this.objective.done) this.economy.awardDecrypt();
    this.economy.awardRoundEnd(playerWon);

    if (winner === 'attacker') this.attackerWins++;
    else this.defenderWins++;

    if (this.audio) { playerWon ? this.audio.win() : this.audio.lose(); }

    // 是否整场结束
    if (this.attackerWins >= C.match.roundsToWin || this.defenderWins >= C.match.roundsToWin) {
      this._matchWinner = this.attackerWins >= C.match.roundsToWin ? 'attacker' : 'defender';
    } else {
      this._matchWinner = null;
    }
  };

  Game.prototype._nextRound = function () {
    if (this._matchWinner) { this.state = 'matchend'; return; }
    this.startRound();
  };

  // ————— 菜单 / 结束输入 —————
  Game.prototype._menuInput = function () {
    if (this.input.justClicked() || this.input.justPressed('enter') || this.input.justPressed(' ')) {
      if (this.audio) this.audio.resume();
      this.startMatch();
    }
  };
  Game.prototype._endInput = function () {
    if (this.input.justPressed('enter') || this.input.justClicked()) this.startMatch();
  };

  // ————— 渲染 —————
  Game.prototype.render = function () {
    var ctx = this.ctx;
    this._drawBackground(ctx);
    this._drawMap(ctx);
    this._drawSite(ctx);

    // 尸体先画
    var i;
    for (i = 0; i < this.agents.length; i++) if (!this.agents[i].alive) this.agents[i].render(ctx, false);
    for (i = 0; i < this.bullets.length; i++) this.bullets[i].render(ctx);
    for (i = 0; i < this.agents.length; i++) if (this.agents[i].alive) this.agents[i].render(ctx, this.agents[i] === this.player);
    this.particles.render(ctx);

    if (this.state === 'menu') { this._drawMenu(ctx); return; }

    this.hud.render(ctx, this);

    if (this.state === 'buy') this.buyMenu.render(ctx, this);
    if (this.state === 'roundend') this._drawRoundEnd(ctx);
    if (this.state === 'matchend') this._drawMatchEnd(ctx);

    // 计分板
    if (this.input.down('tab')) this.hud.renderScoreboard(ctx, this);
  };

  Game.prototype._drawBackground = function (ctx) {
    ctx.fillStyle = '#1a1f26';
    ctx.fillRect(0, 0, this.map.width, this.map.height);
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (var x = 0; x < this.map.width; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, this.map.height); ctx.stroke(); }
    for (var y = 0; y < this.map.height; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(this.map.width, y); ctx.stroke(); }
  };

  Game.prototype._drawMap = function (ctx) {
    var i, b;
    // 掩体墙
    for (i = 0; i < this.map.walls.length; i++) {
      b = this.map.walls[i];
      ctx.fillStyle = '#3a4250';
      ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.strokeStyle = '#4b5566'; ctx.lineWidth = 2;
      ctx.strokeRect(b.x + 1, b.y + 1, b.w - 2, b.h - 2);
    }
    // 箱子
    for (i = 0; i < this.map.crates.length; i++) {
      b = this.map.crates[i];
      ctx.fillStyle = '#6d5637';
      ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.strokeStyle = '#8a6d44'; ctx.lineWidth = 2;
      ctx.strokeRect(b.x + 2, b.y + 2, b.w - 4, b.h - 4);
    }
  };

  Game.prototype._drawSite = function (ctx) {
    var s = this.map.site, o = this.objective;
    // 站点范围
    ctx.save();
    ctx.globalAlpha = 0.18 + (o.decrypting ? 0.12 * (0.5 + 0.5 * Math.sin(this.time * 10)) : 0);
    ctx.fillStyle = o.done ? '#4caf50' : '#ffb300';
    ctx.beginPath(); ctx.arc(s.x, s.y, C.objective.radius, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
    ctx.strokeStyle = o.done ? '#66bb6a' : '#ffca28';
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 6]);
    ctx.beginPath(); ctx.arc(s.x, s.y, C.objective.radius, 0, Math.PI * 2); ctx.stroke();
    ctx.setLineDash([]);
    // 图标
    ctx.fillStyle = o.done ? '#66bb6a' : '#ffca28';
    ctx.font = 'bold 13px Consolas, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('密钥', s.x, s.y + 4);
    ctx.textAlign = 'left';

    // 破译进度环
    if (o.progress > 0 && !o.done) {
      ctx.strokeStyle = '#ffee58';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.arc(s.x, s.y, C.objective.radius + 8, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * o.progress);
      ctx.stroke();
    }
  };

  Game.prototype._drawMenu = function (ctx) {
    var w = this.map.width, h = this.map.height;
    ctx.fillStyle = 'rgba(10,12,16,0.82)'; ctx.fillRect(0, 0, w, h);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffca28'; ctx.font = 'bold 64px "Microsoft YaHei", sans-serif';
    ctx.fillText('三角洲行动', w / 2, h / 2 - 90);
    ctx.fillStyle = '#e0e0e0'; ctx.font = '22px "Microsoft YaHei", sans-serif';
    ctx.fillText('DELTA FORCE · 攻防爆破赛 · 7 局 3 胜制', w / 2, h / 2 - 40);
    ctx.fillStyle = '#90caf9'; ctx.font = '18px "Microsoft YaHei", sans-serif';
    ctx.fillText('WASD 移动   鼠标瞄准/左键射击   R 换弹   F 破译   1-5 道具   V 近战   Shift 冲刺', w / 2, h / 2 + 20);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 26px "Microsoft YaHei", sans-serif';
    if (this.time % 1.2 < 0.75) ctx.fillText('▶ 点击 / 回车 开始对战', w / 2, h / 2 + 80);
    ctx.textAlign = 'left';
  };

  Game.prototype._drawRoundEnd = function (ctx) {
    var w = this.map.width;
    var r = this.roundResult;
    var win = r.winner === 'attacker';
    ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fillRect(0, 250, w, 180);
    ctx.textAlign = 'center';
    ctx.fillStyle = win ? '#66bb6a' : '#ef5350';
    ctx.font = 'bold 46px "Microsoft YaHei", sans-serif';
    ctx.fillText(win ? '本局获胜' : '本局失败', w / 2, 320);
    ctx.fillStyle = '#eee'; ctx.font = '22px "Microsoft YaHei", sans-serif';
    ctx.fillText(r.reason, w / 2, 362);
    ctx.fillStyle = '#ffca28'; ctx.font = 'bold 26px Consolas, monospace';
    ctx.fillText('灵萧队 ' + this.attackerWins + ' : ' + this.defenderWins + ' 敌方', w / 2, 402);
    ctx.textAlign = 'left';
  };

  Game.prototype._drawMatchEnd = function (ctx) {
    var w = this.map.width, h = this.map.height;
    var win = this._matchWinner === 'attacker';
    ctx.fillStyle = 'rgba(8,10,14,0.86)'; ctx.fillRect(0, 0, w, h);
    ctx.textAlign = 'center';
    ctx.fillStyle = win ? '#ffca28' : '#ef5350';
    ctx.font = 'bold 72px "Microsoft YaHei", sans-serif';
    ctx.fillText(win ? '夺冠 · VICTORY' : '战败 · DEFEAT', w / 2, h / 2 - 40);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 34px Consolas, monospace';
    ctx.fillText('灵萧队 ' + this.attackerWins + ' : ' + this.defenderWins + ' 敌方', w / 2, h / 2 + 20);
    ctx.fillStyle = '#90caf9'; ctx.font = '20px "Microsoft YaHei", sans-serif';
    ctx.fillText('本场击杀 ' + this.player.kills + ' · 阵亡 ' + this.player.deaths, w / 2, h / 2 + 60);
    ctx.fillStyle = '#fff'; ctx.font = '22px "Microsoft YaHei", sans-serif';
    ctx.fillText(this.time % 1.2 < 0.7 ? '▶ 点击 / 回车 再来一场' : ' ', w / 2, h / 2 + 110);
    ctx.textAlign = 'left';
  };

  DF.Game = Game;
})(window.DF = window.DF || {});

  </script>

  <script>
/* 引导启动 */
(function (DF) {
  'use strict';

  window.addEventListener('load', function () {
    var canvas = document.getElementById('game');
    var game = new DF.Game(canvas);
    DF.instance = game;

    // 首次交互解锁音频（浏览器策略）
